<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XSS & 클라이언트 보안 스튜디오 — Stitch Security</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #f8fafc;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f1f5f9;
            --border-subtle: #e2e8f0;
            --brand-primary: #0284c7;
            --brand-primary-hover: #0369a1;
            --text-heading: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-canvas); color: var(--text-body); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; min-height: 100vh; line-height: 1.5; }
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        header { border-bottom: 1px solid var(--border-subtle); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; box-shadow: var(--shadow-sm); }
        .timeline-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 20px 24px; margin: 24px 0; box-shadow: var(--shadow-sm); }
        .progress-bar-bg { height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 16px; }
        .progress-bar-fill { height: 100%; width: 20%; background: var(--brand-primary); border-radius: 999px; }
        .step-timeline { display: flex; gap: 8px; overflow-x: auto; }
        .step-item { flex: 1; min-width: 140px; padding: 8px 12px; border-radius: 8px; background: var(--bg-canvas); border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 0.8rem; cursor: pointer; text-align: center; }
        .step-item.active { background: rgba(2, 132, 199, 0.08); border-color: var(--brand-primary); color: var(--brand-primary); font-weight: 700; }
        .workspace { display: grid; grid-template-columns: 1fr 1.15fr; gap: 20px; margin-bottom: 60px; }
        .panel { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; box-shadow: var(--shadow-sm); }
        .form-control { width: 100%; padding: 10px 14px; background: #ffffff; border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-heading); font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; }
        .btn { width: 100%; padding: 10px 18px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .btn-sky { background: var(--brand-primary); color: white; }
        .btn-ghost { background: var(--bg-canvas); border: 1px solid var(--border-subtle); color: var(--text-body); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav-inner">
                <a href="/" class="back-link">← 포털 허브</a>
                <span style="font-weight: 700; color: var(--text-heading);">XSS & 클라이언트 보안 스튜디오</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="timeline-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span style="font-size: 0.875rem; font-weight: 600;">진행률 <span id="progress-percent" style="font-family: 'JetBrains Mono', monospace;">20%</span></span>
                <span id="step-badge" style="font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: rgba(2, 132, 199, 0.08); color: var(--brand-primary);">Step 1 / 5</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
            <div class="step-timeline">
                <button id="pill-1" class="step-item active" onclick="jumpStep(1)">1. 정상 입력</button>
                <button id="pill-2" class="step-item" onclick="jumpStep(2)">2. Script 주입</button>
                <button id="pill-3" class="step-item" onclick="jumpStep(3)">3. 이벤트 핸들러 XSS</button>
                <button id="pill-4" class="step-item" onclick="jumpStep(4)">4. HTML Escape</button>
                <button id="pill-5" class="step-item" onclick="jumpStep(5)">5. XSS 퀴즈</button>
            </div>
        </div>

        <div class="workspace">
            <div class="panel">
                <h3 id="step-title" style="font-size: 1rem; color: var(--text-heading); margin-bottom: 8px;">1. 정상 사용자 입력 렌더링</h3>
                <p id="step-desc" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 16px;">검색창에 입력한 텍스트가 백엔드 API를 거쳐 화면에 렌더링되는 과정을 관찰합니다.</p>

                <form id="xss-form" onsubmit="handleXSS(event)">
                    <div style="margin-bottom: 14px;">
                        <label style="display: block; font-size: 0.825rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px;">입력값 (Input Payload)</label>
                        <input type="text" id="xss-input" class="form-control" value="안녕하세요! 시큐어 코딩 학습입니다." required>
                    </div>
                    <button type="submit" class="btn btn-sky">▶️ 실시간 백엔드 API 호스트 렌더링 실행</button>
                </form>

                <div style="display: flex; gap: 10px; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-subtle);">
                    <button class="btn btn-ghost" id="btn-prev" onclick="prevStep()" disabled>← 이전 단계</button>
                    <button class="btn btn-sky" id="btn-next" onclick="nextStep()">다음 단계 →</button>
                </div>
            </div>

            <div class="panel">
                <h4 style="font-size: 0.95rem; color: var(--text-heading); margin-bottom: 12px;">🖥️ 백엔드 API 응답 및 DOM 출력</h4>
                <div style="background: #0f172a; padding: 14px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #e2e8f0;" id="dom-out">
-- 실행 결과가 여기에 표시됩니다.
                </div>
                <div id="render-win" style="margin-top: 16px; padding: 16px; background: #ffffff; border: 1px dashed var(--border-subtle); border-radius: 8px; min-height: 100px; color: #0f172a;">
                    (화면 출력 결과)
                </div>
            </div>
        </div>
    </main>

    <script>
        let currStep = 1;
        function jumpStep(n) {
            currStep = n;
            document.getElementById('step-badge').textContent = `Step ${n} / 5`;
            document.getElementById('progress-percent').textContent = `${n * 20}%`;
            document.getElementById('progress-fill').style.width = `${n * 20}%`;
            for (let i = 1; i <= 5; i++) document.getElementById(`pill-${i}`).classList.toggle('active', i === n);

            if (n === 2) document.getElementById('xss-input').value = "<script>alert('🚨 XSS 공격 성공!')<\/script>";
            else if (n === 3) document.getElementById('xss-input').value = "<img src=x onerror=\"alert('🚨 XSS 발생! 쿠키 탈취: session_id=ABC123')\">";
            else if (n === 4) document.getElementById('xss-input').value = "<script>alert('XSS 공격!')<\/script>";
        }

        async function handleXSS(e) {
            e.preventDefault();
            const val = document.getElementById('xss-input').value;
            const domOut = document.getElementById('dom-out');
            const renderWin = document.getElementById('render-win');

            const ep = (currStep === 4) ? '/api/secure-xss' : '/api/vulnerable-xss';
            try {
                const res = await fetch(ep, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: val })
                });
                const data = await res.json();
                
                if (data.mode === 'secure') {
                    domOut.textContent = `[Backend API Response]: ${data.escaped_html}`;
                    renderWin.innerText = `검색 결과: ${val}`;
                } else {
                    domOut.textContent = `[Backend API Response]: ${data.raw_html}`;
                    renderWin.innerHTML = `<div>검색 결과: ${val}</div>`;
                }

                alert(data.message);
            } catch (err) {
                alert('API 호출 오류: ' + err.message);
            }
        }

        function nextStep() { if (currStep < 5) jumpStep(currStep + 1); else alert('🎉 XSS 모듈 완수!'); }
        function prevStep() { if (currStep > 1) jumpStep(currStep - 1); }
    </script>
</body>
</html>
