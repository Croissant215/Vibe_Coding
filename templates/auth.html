<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인증/인가 & IDOR 스튜디오 — Stitch Security</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-canvas: #f8fafc;
            --bg-surface: #ffffff;
            --border-subtle: #e2e8f0;
            --brand-primary: #059669;
            --brand-primary-hover: #047857;
            --text-heading: #0f172a;
            --text-body: #334155;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgba(15, 23, 42, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-canvas); color: var(--text-body); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; min-height: 100vh; line-height: 1.5; }
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; }
        header { border-bottom: 1px solid var(--border-subtle); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 50; }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; background: var(--bg-surface); border: 1px solid var(--border-subtle); color: var(--text-muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; box-shadow: var(--shadow-sm); }
        .timeline-card { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 20px 24px; margin: 24px 0; box-shadow: var(--shadow-sm); }
        .progress-bar-bg { height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 16px; }
        .progress-bar-fill { height: 100%; width: 20%; background: var(--brand-primary); border-radius: 999px; }
        .step-timeline { display: flex; gap: 8px; overflow-x: auto; }
        .step-item { flex: 1; min-width: 140px; padding: 8px 12px; border-radius: 8px; background: var(--bg-canvas); border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 0.8rem; cursor: pointer; text-align: center; }
        .step-item.active { background: rgba(5, 150, 105, 0.08); border-color: var(--brand-primary); color: var(--brand-primary); font-weight: 700; }
        .workspace { display: grid; grid-template-columns: 1fr 1.15fr; gap: 20px; margin-bottom: 60px; }
        .panel { background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; box-shadow: var(--shadow-sm); }
        .form-control { width: 100%; padding: 10px 14px; background: #ffffff; border: 1px solid var(--border-subtle); border-radius: 8px; color: var(--text-heading); font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; }
        .btn { width: 100%; padding: 10px 18px; border-radius: 8px; border: none; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        .btn-emerald { background: var(--brand-primary); color: white; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="nav-inner">
                <a href="/" class="back-link">← 포털 허브</a>
                <span style="font-weight: 700; color: var(--text-heading);">인증/인가 & IDOR 스튜디오</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="timeline-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span style="font-size: 0.875rem; font-weight: 600;">진행률 <span id="progress-percent" style="font-family: 'JetBrains Mono', monospace;">20%</span></span>
                <span id="step-badge" style="font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 4px; background: rgba(5, 150, 105, 0.08); color: var(--brand-primary);">Step 1 / 5</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-fill" class="progress-bar-fill"></div></div>
            <div class="step-timeline">
                <button id="pill-1" class="step-item active" onclick="jumpStep(1)">1. 내 프로필 조회</button>
                <button id="pill-2" class="step-item" onclick="jumpStep(2)">2. IDOR 변조</button>
                <button id="pill-3" class="step-item" onclick="jumpStep(3)">3. 세션 인가 검증</button>
                <button id="pill-4" class="step-item" onclick="jumpStep(4)">4. RBAC 권한 제어</button>
                <button id="pill-5" class="step-item" onclick="jumpStep(5)">5. 인가 퀴즈</button>
            </div>
        </div>

        <div class="workspace">
            <div class="panel">
                <h3 id="step-title" style="font-size: 1rem; color: var(--text-heading); margin-bottom: 8px;">1. 본인 회원 정보 조회</h3>
                <p id="step-desc" style="font-size: 0.875rem; color: var(--text-muted); margin-bottom: 16px;">로그인 사용자(user_id=1)가 백엔드 DB 프로필 API를 호출합니다.</p>

                <form id="auth-form" onsubmit="handleAuth(event)">
                    <div style="margin-bottom: 14px;">
                        <label style="display: block; font-size: 0.825rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px;">회원 번호 (user_id)</label>
                        <input type="number" id="userid-input" class="form-control" value="1" required>
                    </div>
                    <button type="submit" class="btn btn-emerald">🔍 실제 백엔드 프로필 API 호출</button>
                </form>
            </div>

            <div class="panel">
                <h4 style="font-size: 0.95rem; color: var(--text-heading); margin-bottom: 12px;">📊 백엔드 API 응답 (SQLite & Session)</h4>
                <div style="background: #0f172a; padding: 14px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #e2e8f0; min-height: 140px;" id="auth-res">
{
  "status": "ready"
}
                </div>
            </div>
        </div>
    </main>

    <script>
        let currStep = 1;
        function jumpStep(n) {
            currStep = n;
            document.getElementById('step-badge').textContent = `Step ${n} / 5`;
            document.getElementById('progress-percent').textContent = `${n * 20}%`;
            document.getElementById('progress-fill').style.width = `${n * 20}%`;
            for (let i = 1; i <= 5; i++) document.getElementById(`pill-${i}`).classList.toggle('active', i === n);

            if (n === 2) document.getElementById('userid-input').value = "2";
            else if (n === 3) document.getElementById('userid-input').value = "2";
        }

        async function handleAuth(e) {
            e.preventDefault();
            const idVal = document.getElementById('userid-input').value;
            const res = document.getElementById('auth-res');

            const ep = (currStep === 3) ? `/api/secure-profile/${idVal}` : `/api/vulnerable-profile/${idVal}`;
            try {
                const response = await fetch(ep);
                const data = await response.json();
                res.innerHTML = JSON.stringify(data, null, 2).replace(/\n/g, '<br>').replace(/ /g, '&nbsp;');
                alert(data.message || data.warning || '조회 완료');
            } catch (err) {
                alert('API 오류: ' + err.message);
            }
        }

        function nextStep() { if (currStep < 5) jumpStep(currStep + 1); else alert('🎉 IDOR 모듈 완수!'); }
        function prevStep() { if (currStep > 1) jumpStep(currStep - 1); }
    </script>
</body>
</html>
