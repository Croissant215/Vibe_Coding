<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSRF & 세션 요청 위조 인터랙티브 학습 스튜디오</title>
    <!-- Google Fonts: Inter & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #090d16;
            --bg-card: rgba(18, 24, 38, 0.75);
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --primary-glow: rgba(245, 158, 11, 0.35);
            
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --text-sub: #64748b;
            
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(at 10% 10%, rgba(245, 158, 11, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(16, 185, 129, 0.12) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 24px;
            line-height: 1.6;
        }

        .container { max-width: 1280px; margin: 0 auto; }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 24px; background: var(--bg-card); backdrop-filter: blur(16px);
            border: 1px solid var(--border-glass); border-radius: var(--radius-lg); margin-bottom: 24px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 42px; height: 42px; background: linear-gradient(135deg, var(--primary), var(--accent-rose));
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        .nav-back-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px;
            background: rgba(30, 41, 59, 0.8); border: 1px solid var(--border-glass);
            color: var(--text-main); border-radius: var(--radius-md); font-size: 0.85rem; font-weight: 600; text-decoration: none;
        }

        .progress-card {
            background: var(--bg-card); backdrop-filter: blur(12px); border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 24px;
        }

        .progress-track {
            height: 10px; background: rgba(15, 23, 42, 0.8); border-radius: 999px; overflow: hidden; border: 1px solid var(--border-glass); margin-bottom: 16px;
        }

        .progress-fill { height: 100%; width: 20%; background: linear-gradient(90deg, var(--primary), var(--accent-emerald)); border-radius: 999px; }

        .step-pills { display: flex; gap: 8px; overflow-x: auto; }
        .step-pill {
            flex: 1; min-width: 140px; padding: 10px 14px; background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-glass); border-radius: var(--radius-md); font-size: 0.8rem; font-weight: 500; color: var(--text-muted); cursor: pointer; text-align: center;
        }

        .step-pill.active { background: rgba(245, 158, 11, 0.15); border-color: var(--primary); color: var(--text-main); font-weight: 600; }

        .workspace-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 24px; }
        .card-panel { background: var(--bg-card); backdrop-filter: blur(16px); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 28px; }

        .form-input { width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-glass); border-radius: var(--radius-md); color: var(--text-main); font-size: 0.95rem; }
        .btn { width: 100%; padding: 12px 20px; border-radius: var(--radius-md); border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        .btn-amber { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: white; }
        .btn-secondary { background: rgba(30, 41, 59, 0.8); border: 1px solid var(--border-glass); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <a href="/" class="nav-back-btn">← 메인 허브로</a>
                <div class="logo-icon">🔄</div>
                <div>
                    <h1 style="font-size: 1.25rem;">CSRF & 세션 요청 위조 학습 스튜디오</h1>
                    <p style="font-size: 0.8rem; color: var(--text-muted);">Module 3: Cross-Site Request Forgery & Anti-CSRF Token Lab</p>
                </div>
            </div>
        </header>

        <div class="progress-card">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <div style="font-weight: 600; color: var(--primary);">🎯 진행 상태 <span id="step-badge">Step 1 / 5</span></div>
                <div id="progress-percent" style="font-weight: 700;">20% 완료</div>
            </div>
            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
            <div class="step-pills">
                <button id="pill-1" class="step-pill active" onclick="jumpStep(1)">1. 정상 송금 요청</button>
                <button id="pill-2" class="step-pill" onclick="jumpStep(2)">2. 위조 송금 공격 (CSRF)</button>
                <button id="pill-3" class="step-pill" onclick="jumpStep(3)">3. Anti-CSRF 토큰 방어</button>
                <button id="pill-4" class="step-pill" onclick="jumpStep(4)">4. SameSite 쿠키 방어</button>
                <button id="pill-5" class="step-pill" onclick="jumpStep(5)">5. CSRF 퀴즈 및 완료</button>
            </div>
        </div>

        <div class="workspace-grid">
            <div class="card-panel">
                <h3 id="step-title" style="font-size: 1.15rem; color: var(--primary); margin-bottom: 8px;">1. 정상 계좌 송금 요청</h3>
                <p id="step-desc" style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px;">로그인된 사용자가 정당하게 송금 폼을 작성하여 제출하는 정상적인 HTTP POST 요청을 확인합니다.</p>

                <form id="csrf-form" onsubmit="handleCSRFSubmit(event)">
                    <div style="margin-bottom: 14px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px;">수금자 계좌 (Recipient)</label>
                        <input type="text" id="recipient-input" class="form-input" value="friend_account_12" required>
                    </div>
                    <div style="margin-bottom: 14px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px;">송금 금액 (Amount)</label>
                        <input type="number" id="amount-input" class="form-input" value="50000" required>
                    </div>
                    <button type="submit" class="btn btn-amber">💸 송금 요청 제출</button>
                </form>

                <div style="display: flex; gap: 12px; margin-top: 24px;">
                    <button class="btn btn-secondary" id="btn-prev" onclick="prevStep()" disabled>← 이전 단계</button>
                    <button class="btn btn-amber" id="btn-next" onclick="nextStep()">다음 단계 →</button>
                </div>
            </div>

            <div class="card-panel">
                <h4 style="font-size: 1rem; color: var(--text-main); margin-bottom: 12px;">📊 HTTP 요청 및 세션 상태 분석</h4>
                <div style="background: #050811; padding: 16px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #a5b4fc; min-height: 140px;" id="http-inspector">
-- 송금 제출 시 전송된 HTTP 헤더와 세션 쿠키 검증 결과가 표시됩니다.
                </div>
                <div id="csrf-result" style="margin-top: 16px; padding: 14px; border-radius: 8px; display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        let currStep = 1;
        function jumpStep(n) {
            currStep = n;
            document.getElementById('step-badge').textContent = `Step ${n} / 5`;
            document.getElementById('progress-percent').textContent = `${n * 20}% 완료`;
            document.getElementById('progress-fill').style.width = `${n * 20}%`;
            for (let i = 1; i <= 5; i++) document.getElementById(`pill-${i}`).classList.toggle('active', i === n);
            document.getElementById('btn-prev').disabled = (n === 1);
        }

        function handleCSRFSubmit(e) {
            e.preventDefault();
            const recipient = document.getElementById('recipient-input').value;
            const amount = document.getElementById('amount-input').value;
            const inspector = document.getElementById('http-inspector');
            const res = document.getElementById('csrf-result');

            if (currStep === 2) {
                inspector.innerHTML = `POST /api/transfer HTTP/1.1<br>Host: bank.com<br>Cookie: session_id=USER_ALICE_SESSION<br>Referer: http://attacker-malicious-site.com<br><br>recipient=attacker_hacker&amount=1000000`;
                res.style.display = 'block';
                res.style.background = 'rgba(244, 63, 94, 0.15)';
                res.style.color = '#fb7185';
                res.innerHTML = '🚨 [CSRF 공격 성공!] 해커가 만든 타 사이트를 방문했을 뿐인데, 사용자의 자동 첨부 쿠키 세션으로 해커 계좌로 1,000,000원이 무단 송금되었습니다!';
            } else if (currStep === 3 || currStep === 4) {
                inspector.innerHTML = `POST /api/transfer HTTP/1.1<br>Host: bank.com<br>Cookie: session_id=USER_ALICE_SESSION<br>X-CSRF-Token: 9f8a2b3c4d5e6f<br><br>recipient=${recipient}&amount=${amount}`;
                res.style.display = 'block';
                res.style.background = 'rgba(16, 185, 129, 0.15)';
                res.style.color = '#34d399';
                res.innerHTML = '🛡️ [Anti-CSRF 방어 성공!] 타 사이트에서 위조된 요청은 올바른 CSRF 난수 토큰(Token)을 제출할 수 없으므로 백엔드에서 무단 송금이 차단되었습니다!';
            } else {
                inspector.innerHTML = `POST /api/transfer HTTP/1.1<br>Host: bank.com<br>Cookie: session_id=USER_ALICE_SESSION<br><br>recipient=${recipient}&amount=${amount}`;
                res.style.display = 'block';
                res.style.background = 'rgba(16, 185, 129, 0.15)';
                res.style.color = '#34d399';
                res.innerHTML = `✅ [정상 송금 완료] ${recipient} 님에게 ${amount}원이 정상 전송되었습니다.`;
            }
        }

        function nextStep() { if (currStep < 5) jumpStep(currStep + 1); else alert('🎉 CSRF 방어 모듈 완수!'); }
        function prevStep() { if (currStep > 1) jumpStep(currStep - 1); }
    </script>
</body>
</html>
